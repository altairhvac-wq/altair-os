<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Altair native app icon r01">
  <defs>
    <linearGradient id="plateBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0C0C"/>
      <stop offset="45%" stop-color="#030303"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="plateVignette" cx="50%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
    <linearGradient id="rimGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="12%" stop-color="#F5E6A3"/>
      <stop offset="35%" stop-color="#E8C86A"/>
      <stop offset="60%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#5A4208"/>
    </linearGradient>
    <linearGradient id="rimSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="28%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldFace" x1="16%" y1="0%" x2="84%" y2="100%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="14%" stop-color="#FFF0A8"/>
      <stop offset="32%" stop-color="#F0D060"/>
      <stop offset="58%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#6B4F0A"/>
    </linearGradient>
    <linearGradient id="goldHot" x1="22%" y1="0%" x2="78%" y2="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="35%" stop-color="#FFF8D8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldBevel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="45%" stop-color="#FFF8D0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="flare" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="40%" stop-color="#F5E6A3" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#F5E6A3" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>
    <filter id="starGlint">
      <feGaussianBlur stdDeviation="0.75" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#plateBg)"/>
  <rect width="512" height="512" rx="112" fill="url(#plateVignette)"/>
  <rect width="512" height="512" rx="112" filter="url(#grain)"/>

  <rect x="2.25" y="2.25" width="507.5" height="507.5" rx="109.75" fill="none" stroke="url(#rimGold)" stroke-width="4.5"/>
  <rect x="2.25" y="2.25" width="507.5" height="507.5" rx="109.75" fill="none" stroke="url(#rimSheen)" stroke-width="4.5" opacity="0.92"/>
  <circle cx="432" cy="82" r="6" fill="#FFFFFF" opacity="0.78" filter="url(#starGlint)"/>

  <g id="mark">
    <g transform="translate(256 198) scale(5.92) translate(-40 -32)">
      <path fill="url(#goldShadow)" d="M40 8L63 60H55L48 41H32L25 60H17L40 8Z" opacity="0.42"/>
      <path fill="url(#goldFace)" d="M40 6L62 58H54L48 40H32L26 58H18L40 6Z"/>
      <path fill="url(#goldBevel)" d="M40 6L62 58H54L48 40H32L26 58H18L40 6Z"/>
      <path fill="url(#goldHot)" d="M40 6L62 58H54L48 40H32L26 58H18L40 6Z"/>
      <g transform="translate(40 38) scale(1.12) translate(-40 -38)">
        <path fill="url(#goldFace)" d="M40 26L43.2 36.5L54 38L43.2 39.5L40 50L36.8 39.5L26 38L36.8 36.5L40 26Z"/>
        <path fill="url(#goldHot)" d="M40 26L43.2 36.5L54 38L43.2 39.5L40 50L36.8 39.5L26 38L36.8 36.5L40 26Z" opacity="0.55"/>
        <path fill="none" stroke="url(#goldFace)" stroke-width="1.85" stroke-linecap="round" d="M28 38.5Q40 42.5 52 38.5"/>
        <circle cx="40" cy="38" r="1.75" fill="#FFFFFF" opacity="1" filter="url(#starGlint)"/>
        <path fill="#FFFFFF" opacity="0.55" d="M40 35.8L41.1 38L40 40.2L38.9 38Z"/>
      </g>
    </g>
  </g>

  <text
    x="256"
    y="388"
    text-anchor="middle"
    fill="url(#goldFace)"
    font-family="Georgia, Times New Roman, Palatino Linotype, serif"
    font-size="52"
    font-weight="600"
    letter-spacing="0.32em"
  >ALTAIR</text>

  <ellipse cx="256" cy="418" rx="132" ry="2.6" fill="url(#flare)"/>
  <line x1="132" y1="418" x2="380" y2="418" stroke="url(#flare)" stroke-width="1.45" opacity="0.82"/>
  <circle cx="256" cy="418" r="2.8" fill="#FFFFFF" opacity="0.95" filter="url(#starGlint)"/>
</svg>
